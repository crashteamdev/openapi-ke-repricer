openapi: 3.0.0
info:
  version: 0.0.1
  title: CrashTeam KazanExpress Repricer API
  description: |
    CrashTeamDev KazanExpress Repricer API
  termsOfService: http://marketdb.ru/terms-of-use/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://{subdomain}.marketdb.ru/{version}
    variables:
      subdomain:
        default: napi
      version:
        enum:
          - v1
        default: v1
security:
  - bearer: []
paths:
  /accounts:
    get:
      summary: Получение списка KazanExpress аккаунтов
      operationId: getKeAccounts
      tags:
        - account
      parameters:
        - $ref: '#/components/parameters/requestId'
      responses:
        '200':
          description: Получен список KazanExpress аккаунтов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeAccount'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Аккаунты не найдены
    post:
      summary: Добавить KazanExpress аккаунт
      description: |
        Добавление аккаунтов ограничено тарифом пользователя.
      operationId: addKeAccount
      tags:
        - account
      parameters:
        - $ref: '#/components/parameters/requestId'
      requestBody:
        $ref: '#/components/requestBodies/AddKeAccount'
      responses:
        '201':
          description: Аккаунт добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
    get:
      summary: Получить данные аккаунта KazanExpress
      operationId: getKeAccount
      tags:
        - account
      responses:
        '200':
          description: Получены данные аккаунта KazanExpress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeAccount'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Аккаунт не найден
    patch:
      summary: Обновить данные аккаунта KazanExpress
      operationId: patchKeAccount
      tags:
        - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchKeAccount'
      responses:
        '200':
          description: Данные аккаунта KazanExpress обновлены.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Аккаунт не найден
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Удалить аккаунт KazanExpress
      operationId: deleteKeAccount
      tags:
        - account
      responses:
        '204':
          description: Аккаунт KazanExpress удален.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /accounts/{id}/update:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
    post:
      summary: Синхронизация данных аккаунта с системой KazanExpress
      operationId: updateKeAccountData
      tags:
        - account
      responses:
        '200':
          description: Задача на обновление аккаунта добавлена
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /accounts/{id}/shops:
    get:
      summary: Получение списка магазинов аккаунта
      operationId: getKeAccountShops
      tags:
        - shop
      parameters:
        - $ref: '#/components/parameters/requestId'
        - $ref: '#/components/parameters/keAccountId'
      responses:
        '200':
          description: Получен список магазинов KazanExpress для указанного аккаунта
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeAccountShop'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Аккаунты не найдены
  /accounts/{id}/monitor:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
    patch:
      summary: Переключить состояние мониторинга аккаунта KazanExpress
      operationId: patchKeAccountMonitoringState
      tags:
        - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchKeAccountMonitoringState'
      responses:
        '200':
          description: Состояние мониторинга изменено
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Аккаунт не найден
  /accounts/{id}/initialization:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
    patch:
      summary: Запустить работу по инициализации аккаунта KazanExpress
      operationId: patchKeAccountInitializationState
      tags:
        - account
      responses:
        '200':
          description: Инициализация аккаунта запущена в работу
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Аккаунт не найден
  /accounts/{id}/price-history:
    get:
      summary: Получение истории изменений цены товаров на KazanExpress аккаунте
      operationId: getKeAccountShopItemPriceChangeHistory
      tags:
        - account
      parameters:
        - $ref: '#/components/parameters/requestId'
        - $ref: '#/components/parameters/keAccountId'
        - $ref: '#/components/parameters/collectionLimit'
        - $ref: '#/components/parameters/collectionOffset'
        - $ref: '#/components/parameters/collectionFilter'
        - $ref: '#/components/parameters/collectionSort'
      responses:
        '200':
          description: Получен список истории изменений цены товаров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeAccountPriceChangeHistory'
          headers:
            Pagination-Total:
              $ref: '#/components/headers/Pagination-Total'
            Pagination-Limit:
              $ref: '#/components/headers/Pagination-Limit'
            Pagination-Offset:
              $ref: '#/components/headers/Pagination-Offset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: История не найдена
  /accounts/{id}/items/{shopItemId}:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
      - $ref: '#/components/parameters/keAccountShopItemId'
    get:
      summary: Получить информацию по товару пользователя
      operationId: getKeAccountShopItem
      tags:
        - item
      responses:
        '200':
          description: Получена информация о товаре пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeAccountShopItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Редактировать параметры изменения цены товара
      operationId: patchKeAccountShopitem
      tags:
        - item
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchKeAccountShopItem'
        required: true
      responses:
        '200':
          description: Параметры успешно отредактированы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeAccountShopItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /accounts/{id}/shops/{shopId}/items:
    get:
      summary: Получение списка товаров магазина пользователя
      operationId: getKeAccountShopItems
      tags:
        - item
      parameters:
        - $ref: '#/components/parameters/requestId'
        - $ref: '#/components/parameters/keAccountId'
        - $ref: '#/components/parameters/keAccountShopId'
        - $ref: '#/components/parameters/collectionLimit'
        - $ref: '#/components/parameters/collectionOffset'
        - $ref: '#/components/parameters/collectionFilter'
        - $ref: '#/components/parameters/collectionSort'
      responses:
        '200':
          description: Получен список товаров магазина пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeAccountShopItem'
          headers:
            Pagination-Total:
              $ref: '#/components/headers/Pagination-Total'
            Pagination-Limit:
              $ref: '#/components/headers/Pagination-Limit'
            Pagination-Offset:
              $ref: '#/components/headers/Pagination-Offset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Товары не найдены
  /accounts/{id}/shops/{shopId}/pool-items:
    get:
      summary: Получение списка товаров магазина пользователя в пуле для отслеживания
      operationId: getKeAccountShopItemsPool
      tags:
        - item
      parameters:
        - $ref: '#/components/parameters/requestId'
        - $ref: '#/components/parameters/keAccountId'
        - $ref: '#/components/parameters/keAccountShopId'
        - $ref: '#/components/parameters/collectionLimit'
        - $ref: '#/components/parameters/collectionOffset'
        - $ref: '#/components/parameters/collectionFilter'
        - $ref: '#/components/parameters/collectionSort'
      responses:
        '200':
          description: Получен список товаров магазина пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeAccountShopItem'
          headers:
            Pagination-Total:
              $ref: '#/components/headers/Pagination-Total'
            Pagination-Limit:
              $ref: '#/components/headers/Pagination-Limit'
            Pagination-Offset:
              $ref: '#/components/headers/Pagination-Offset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Товары не найдены
  /accounts/{id}/pool-items:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
    post:
      summary: Добавить товар в пул для отслеживания
      description: |
        Добавление товара в пул ограниченно тарифом пользователя.
      operationId: addKeAccountShopItemPool
      tags:
        - item
      requestBody:
        $ref: '#/components/requestBodies/AddKeAccountShopItemIntoPool'
      responses:
        '200':
          description: Товар добавлен
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Достигнуто максимальное кол-во товаров в пуле
    delete:
      summary: Удалить товар из пула для отслеживания
      operationId: removeKeAccountShopItemFromPool
      tags:
        - item
      requestBody:
        $ref: '#/components/requestBodies/RemoveKeAccountShopItemFromPool'
      responses:
        '204':
          description: Товар удален
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /accounts/pool-items-count:
    parameters:
      - $ref: '#/components/parameters/requestId'
    get:
      summary: Получить общее кол-во товаров в пуле на отслеживание
      operationId: getAccountShopItemPoolCount
      tags:
        - item
      responses:
        '200':
          description: Кол-во товаров в пуле
          content:
            application/json:
              schema:
                properties:
                  count:
                    type: integer
                    format: int32
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /accounts/{id}/shop-item-competitor:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
    post:
      summary: Добавить конкурентный товар для отслеживания
      operationId: addKeAccountShopItemCompetitor
      tags:
        - item
      requestBody:
        $ref: '#/components/requestBodies/AddKeAccountShopItemCompetitor'
      responses:
        '200':
          description: Конкурентный товар добавлен
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Достигнуто максимальное кол-во товаров в пуле
    delete:
      summary: Удалить конкурентный товар из списка отслеживаемых
      operationId: removeKeAccountShopItemCompetitor
      tags:
        - item
      requestBody:
        $ref: '#/components/requestBodies/RemoveKeAccountShopItemCompetitor'
      responses:
        '200':
          description: Конкурентный товар удален
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /accounts/{id}/shops/{shopId}/items/{shopItemId}/competitor-items:
    get:
      summary: Получение списка назначенных конкурентов товара
      operationId: getKeAccountCompetitorShopItems
      tags:
        - item
      parameters:
        - $ref: '#/components/parameters/requestId'
        - $ref: '#/components/parameters/keAccountId'
        - $ref: '#/components/parameters/keAccountShopId'
        - $ref: '#/components/parameters/keAccountShopItemId'
        - $ref: '#/components/parameters/collectionLimit'
        - $ref: '#/components/parameters/collectionOffset'
        - $ref: '#/components/parameters/collectionFilter'
        - $ref: '#/components/parameters/collectionSort'
      responses:
        '200':
          description: Получен список назначенных конкурентов товара
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KeAccountCompetitorShopItem'
          headers:
            Pagination-Total:
              $ref: '#/components/headers/Pagination-Total'
            Pagination-Limit:
              $ref: '#/components/headers/Pagination-Limit'
            Pagination-Offset:
              $ref: '#/components/headers/Pagination-Offset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Товары не найдены
  /accounts/{id}/shops/{shopId}/items/{shopItemId}/similar:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/keAccountId'
      - $ref: '#/components/parameters/keAccountShopId'
      - $ref: '#/components/parameters/keAccountShopItemId'
    get:
      summary: Получение списка возможных конкурентных товаров
      operationId: getKeAccountShopItemSimilar
      tags:
        - item
      responses:
        '200':
          description: Получен список возможных конкурентных товаров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SimilarItem'
          headers:
            Pagination-Total:
              $ref: '#/components/headers/Pagination-Total'
            Pagination-Limit:
              $ref: '#/components/headers/Pagination-Limit'
            Pagination-Offset:
              $ref: '#/components/headers/Pagination-Offset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Товары не найдены
  /user/subscription:
    get:
      summary: Информации о подписке пользователя
      operationId: getUserSubscription
      tags:
        - subscription
      parameters:
        - $ref: '#/components/parameters/requestId'
      responses:
        '200':
          description: Получена информация о подписке пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Аккаунты не найдены
  /subscriptions:
    get:
      summary: Получение списка подписок
      operationId: getSubscriptions
      tags:
        - subscription
      parameters:
        - $ref: '#/components/parameters/requestId'
      responses:
        '200':
          description: Получен список подписок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /payment/subscription:
    parameters:
      - $ref: '#/components/parameters/requestId'
      - $ref: '#/components/parameters/idempotencyKey'
    post:
      summary: Создать платеж на выбранный тарифный план
      description: >
        Создание платежа может быть ограниченно текущим тарифным планом.

        К примеру, пользователь может не иметь возможности понизить тарифный
        план, если выбранный план превышает текущие лимиты
      operationId: createSubsriptionPayment
      tags:
        - payment
      requestBody:
        $ref: '#/components/requestBodies/CreateSubscriptionPayment'
      responses:
        '201':
          description: Платеж создан
          content:
            application/json:
              schema:
                properties:
                  paymentUrl:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Достигнуто максимальное кол-во товаров в пуле
  /similar/products:
    get:
      summary: Получение списка похожих товаров
      operationId: getSimilarProducts
      tags:
        - other
      parameters:
        - $ref: '#/components/parameters/requestId'
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/skuId'
      responses:
        '200':
          description: Получение списка похожих товаров KazanExpress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SimilarItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    bearer:
      description: >
        Для аутентификации вызовов мы используем [JWT](https://jwt.io).
        Cоответствующий ключ передается в заголовке.

        ```shell
          Authorization: Bearer {TOKENIZATION|PRIVATE_JWT}
        ```
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    requestId:
      name: X-Request-ID
      in: header
      description: Уникальный идентификатор запроса к системе
      required: true
      schema:
        type: string
        format: uuid
    keAccountId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/KeAccountId'
    collectionLimit:
      name: limit
      in: query
      description: The collection items limit.
      schema:
        type: integer
        minimum: 0
        maximum: 1000
    collectionOffset:
      name: offset
      in: query
      description: The collection items offset.
      schema:
        type: integer
        minimum: 0
    collectionFilter:
      name: filter
      in: query
      description: >
        The collection items filter requires a special format.

        Use "," for multiple allowed values.  Use ";" for multiple fields.

        See the [filter
        guide](https://api-reference.rebilly.com/#section/Using-filter-with-collections)
        for more options and examples about this format.
      schema:
        type: string
    collectionSort:
      name: sort
      in: query
      description: >-
        The collection items sort field and order (prefix with "-" for
        descending sort).
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
    keAccountShopItemId:
      name: shopItemId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/KeAccountShopItemId'
    keAccountShopId:
      name: shopId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/KeAccountShopId'
    idempotencyKey:
      name: Idempotency-Key
      in: header
      description: Idempotency key
      required: true
      schema:
        type: string
        format: uuid
    productId:
      name: productId
      in: query
      description: Item product id.
      schema:
        type: integer
        format: int64
    skuId:
      name: skuId
      in: query
      description: Product item sku id.
      schema:
        type: integer
        format: int64
  schemas:
    MonitorState:
      type: string
      enum:
        - suspended
        - active
    UpdateState:
      type: string
      enum:
        - not_started
        - in_progress
        - finished
        - error
    InitializeState:
      type: string
      enum:
        - not_started
        - in_progress
        - finished
        - error
    KeAccount:
      type: object
      properties:
        id:
