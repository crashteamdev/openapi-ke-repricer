            required:
              - code
            properties:
              code:
                type: string
                enum:
                  - invalidRequest
              message:
                type: string
    Unauthorized:
      description: Несанкционированный доступ, использовались неверные учетные данные.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
